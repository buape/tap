name: update catty formula

on:
  repository_dispatch:
    types:
      - catty_release
  workflow_dispatch:
    inputs:
      tag:
        description: Catty release tag, e.g. v0.1.0
        required: true

permissions:
  contents: write

jobs:
  update-catty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set release values
        id: release
        run: |
          TAG="${{ github.event.client_payload.tag || inputs.tag }}"
          REPO="${{ github.event.client_payload.repo || 'buape/catty' }}"
          VERSION="${TAG#v}"
          {
            echo "tag=$TAG"
            echo "repo=$REPO"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Generate formula
        env:
          REPO: ${{ steps.release.outputs.repo }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          base="https://github.com/${REPO}/releases/download/${TAG}"
          darwin_arm_url="${base}/catty-${VERSION}-darwin-arm64.tar.gz"
          darwin_amd_url="${base}/catty-${VERSION}-darwin-amd64.tar.gz"
          linux_amd_url="${base}/catty-${VERSION}-linux-amd64.tar.gz"

          darwin_arm_sha="$(curl -fsSL "$darwin_arm_url" | shasum -a 256 | cut -d ' ' -f 1)"
          darwin_amd_sha="$(curl -fsSL "$darwin_amd_url" | shasum -a 256 | cut -d ' ' -f 1)"
          linux_amd_sha="$(curl -fsSL "$linux_amd_url" | shasum -a 256 | cut -d ' ' -f 1)"

          mkdir -p Formula
          cat > Formula/catty.rb <<EOF
          class Catty < Formula
            desc "Personal assistant agent harness for Discord"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${darwin_arm_url}"
                sha256 "${darwin_arm_sha}"
              end

              on_intel do
                url "${darwin_amd_url}"
                sha256 "${darwin_amd_sha}"
              end
            end

            on_linux do
              on_intel do
                url "${linux_amd_url}"
                sha256 "${linux_amd_sha}"
              end

              on_arm do
                disable! date: "$(date +%F)", because: "catty does not provide Linux ARM builds"
              end
            end

            def install
              bin.install "catty"
            end

            test do
              assert_path_exists bin/"catty"
            end
          end
          EOF

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Link checkout as tap
        run: |
          tap_dir="$(brew --repository)/Library/Taps/buape/homebrew-tap"
          rm -rf "$tap_dir"
          mkdir -p "$(dirname "$tap_dir")"
          ln -s "$GITHUB_WORKSPACE" "$tap_dir"

      - run: brew audit --strict --formula buape/tap/catty

      - name: Commit formula
        env:
          BUAPEBOT_PAT: ${{ secrets.BUAPEBOT_PAT }}
        run: |
          git add Formula/catty.rb
          if git diff --cached --quiet -- Formula/catty.rb; then
            echo "Formula already up to date."
            exit 0
          fi
          git config user.name "buapebot"
          git config user.email "119761697+buapebot@users.noreply.github.com"
          git commit -m "chore: update catty to ${{ steps.release.outputs.tag }}"
          git push "https://x-access-token:${BUAPEBOT_PAT}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
